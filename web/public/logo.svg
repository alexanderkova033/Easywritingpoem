<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 88" width="300" height="88">
  <!-- Feather body -->
  <path d="M60 22C64 25 65 33 59 42L52 51L50 57L48 51C45 44 46 34 60 22Z" fill="#7a9b7c"/>
  <!-- Spine -->
  <path d="M60 22L50 52" stroke="#0a0f0d" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.45"/>
  <!-- Nib -->
  <path d="M48 51L50 57" stroke="#c5d4c8" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Wordmark — "easywriting" -->
  <text
    x="96" y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="600"
    fill="#1a2e1d"
    letter-spacing="-0.6"
  >easywriting</text>

  <!-- Decorative rule under the wordmark -->
  <line x1="96" y1="58" x2="228" y2="58" stroke="#7a9b7c" stroke-width="0.9" opacity="0.55"/>

  <!-- Product badge — "poem" pill below the rule -->
  <g transform="translate(96 64)">
    <rect x="0" y="0" width="50" height="18" rx="5" fill="#eaf0eb" stroke="#7a9b7c" stroke-width="1"/>
    <text
      x="25" y="13"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="11"
      font-weight="700"
      fill="#3d5e41"
      letter-spacing="1"
      text-anchor="middle"
    >POEM</text>
  </g>
</svg>
