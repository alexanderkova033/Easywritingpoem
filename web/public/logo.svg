<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 88" width="300" height="88">
  <!-- Feather quill — drawn natively for the 88px icon area, no background -->
  <g>
    <!-- Soft drop shadow so the green reads on any tab/page color -->
    <path
      d="M70 10 C75 14 78 28 60 52 L46 72 L40 80 L36 72 L34 64 C30 48 36 28 70 10 Z"
      fill="rgba(20,40,22,0.10)"
      transform="translate(1.5 2)"
    />

    <!-- Feather body -->
    <path
      d="M70 10 C75 14 78 28 60 52 L46 72 L40 80 L36 72 L34 64 C30 48 36 28 70 10 Z"
      fill="#68aa6e"
    />

    <!-- Top highlight along the leading edge -->
    <path
      d="M70 10 C66 14 50 22 40 38"
      stroke="#a8d0ab"
      stroke-width="1.4"
      stroke-linecap="round"
      fill="none"
      opacity="0.7"
    />

    <!-- Central spine -->
    <path
      d="M70 10 L40 80"
      stroke="#1f3a22"
      stroke-width="0.8"
      stroke-linecap="round"
      fill="none"
      opacity="0.55"
    />

    <!-- Barbs — left side of spine -->
    <g stroke="#3d7a44" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.45">
      <path d="M62 18 L52 22"/>
      <path d="M58 26 L46 30"/>
      <path d="M54 34 L42 38"/>
      <path d="M50 42 L40 46"/>
      <path d="M48 50 L40 54"/>
      <path d="M46 58 L40 62"/>
    </g>

    <!-- Barbs — right side of spine -->
    <g stroke="#4a8a52" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.55">
      <path d="M64 16 L72 14"/>
      <path d="M60 24 L70 22"/>
      <path d="M57 32 L67 31"/>
      <path d="M53 41 L63 41"/>
      <path d="M50 50 L58 51"/>
    </g>

    <!-- Nib highlight -->
    <path
      d="M36 72 L40 80"
      stroke="#dceadd"
      stroke-width="2.2"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Subtle outline for visibility on light backgrounds -->
    <path
      d="M70 10 C75 14 78 28 60 52 L46 72 L40 80 L36 72 L34 64 C30 48 36 28 70 10 Z"
      fill="none"
      stroke="#1f3a22"
      stroke-width="0.8"
      stroke-linejoin="round"
      opacity="0.35"
    />
  </g>

  <!-- Wordmark: "easywriting" -->
  <text
    x="100" y="56"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="600"
    fill="#1a2e1d"
    letter-spacing="-0.6"
  >easywriting</text>

  <!-- Product badge: "poem" pill -->
  <g transform="translate(238 40)">
    <rect
      x="0" y="0" width="48" height="20" rx="5"
      fill="#e8f1e9"
      stroke="#68aa6e"
      stroke-width="1"
    />
    <text
      x="24" y="14"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="11"
      font-weight="700"
      fill="#3d7a44"
      letter-spacing="0.8"
      text-anchor="middle"
    >POEM</text>
  </g>
</svg>
