<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 176" width="600" height="176">
  <!-- Feather scaled to fill the icon area (~160px tall) -->
  <g transform="translate(-148 -64) scale(4)">
    <!-- Feather body -->
    <path d="M60 22C64 25 65 33 59 42L52 51L50 57L48 51C45 44 46 34 60 22Z" fill="#7a9b7c"/>
    <!-- Spine -->
    <path d="M60 22L50 52" stroke="#0a0f0d" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.45"/>
    <!-- Nib -->
    <path d="M48 51L50 57" stroke="#c5d4c8" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark: "easywriting" -->
  <text
    x="200" y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="600"
    fill="#1a2e1d"
    letter-spacing="-1.2"
  >easywriting</text>

  <!-- Decorative rule under the wordmark -->
  <line x1="200" y1="116" x2="456" y2="116" stroke="#7a9b7c" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>

  <!-- Product badge — "poem" pill -->
  <g transform="translate(200 128)">
    <rect x="0" y="0" width="100" height="36" rx="10" fill="#eaf0eb" stroke="#7a9b7c" stroke-width="2"/>
    <text
      x="50" y="26"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="22"
      font-weight="700"
      fill="#3d5e41"
      letter-spacing="2"
      text-anchor="middle"
    >POEM</text>
  </g>
</svg>
