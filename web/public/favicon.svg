  <rect width="64" height="64" rx="12" fill="#eaf0eb"/>
  <g transform="translate(32 32) scale(3.6) translate(-17 -17.5)">
    <!-- Quill feather body -->
    <path d="M21 8C23.5 9 25 12.5 21 18L16 23.5L14.5 27L13 23.5C10.5 19.5 11.5 14 21 8Z" fill="#7a9b7c"/>
