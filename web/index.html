<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>easywriting-poem — Poetry Workshop</title>
    <meta
      name="description"
      content="A private poetry workshop for serious writers. Meter, rhyme, syllables, spelling, and AI analysis — all in your browser, no account required."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.easywritingpoem.org/" />
    <meta property="og:title" content="easywriting-poem — Poetry Workshop" />
    <meta
      property="og:description"
      content="A private poetry workshop for serious writers. Meter, rhyme, syllables, spelling, and AI analysis — all in your browser, no account required."
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="easywriting-poem — Poetry Workshop" />
    <meta
      name="twitter:description"
      content="A private poetry workshop for serious writers. Meter, rhyme, syllables, spelling, and AI analysis — no account required."
    />

    <!-- Network hints: warm DNS/TLS for the third-party origins we hit first. -->
    <!-- Google Fonts — display=swap is already set so text renders with system fallbacks while fonts load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Datamuse + dictionaryapi.dev are called the first time the user opens a rhyme/definition popover. -->
    <link rel="dns-prefetch" href="https://api.datamuse.com" />
    <link rel="dns-prefetch" href="https://api.dictionaryapi.dev" />
    <!-- Vercel analytics / speed insights endpoints. -->
    <link rel="dns-prefetch" href="https://va.vercel-scripts.com" />
    <link rel="dns-prefetch" href="https://vitals.vercel-insights.com" />
    <!-- Preload the two fonts most users see immediately (default poem + UI font).
         The stylesheet href below loads ALL variants; these preloads just give the
         two critical ones a head-start so the first-paint swap is imperceptible. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;1,7..72,400&display=swap"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>
      <div style="font-family:Georgia,serif;max-width:520px;margin:5rem auto;padding:2.5rem 2rem;color:#253028;background:#f6faf7;border-radius:14px;border:1px solid #cfd9d1;box-shadow:0 8px 32px rgba(0,0,0,0.08);">
        <h1 style="font-size:1.35rem;margin:0 0 0.5rem;font-weight:700;letter-spacing:-0.01em;">easywriting-poem</h1>
        <p style="font-size:0.95rem;color:#4d5f54;margin:0 0 1.5rem;line-height:1.6;">A private poetry workshop with meter, rhyme, syllable, and spelling analysis — everything runs in your browser and nothing leaves your device.</p>
        <p style="font-size:0.95rem;margin:0 0 0.6rem;font-weight:600;">JavaScript is required to run this app.</p>
        <p style="font-size:0.88rem;color:#4d5f54;margin:0;line-height:1.6;">Please enable JavaScript in your browser settings and reload the page. Most modern browsers have it on by default — check your extensions or content-blocker settings if you see this message.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
