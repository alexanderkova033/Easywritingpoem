      <div class="ep-noscript">
        <h1>easywriting-poem</h1>
        <p class="ep-tagline">A quiet place to write poetry.</p>

        <p>A private, browser-based poetry workshop. Draft on the left; syllables, meter, rhyme, repeats, and spelling update beside you. Optional AI critique on demand. Nothing leaves your browser unless you ask it to.</p>

        <h2>What it does</h2>
        <ul>
          <li><strong>Local-first.</strong> Drafts, snapshots, goals, and personal dictionary live in your browser. Works offline after first load.</li>
          <li><strong>Poetry-specific tools.</strong> Syllables, meter (CMU dictionary + heuristics), rhyme (strict/near/broad), repetition, poetry-aware spelling.</li>
          <li><strong>Optional AI.</strong> Critique with selectable harshness, line rewrites, idea sparks, theme generation. No signup.</li>
          <li><strong>Calm UI.</strong> No popups, no nags. Tools speak when asked.</li>
        </ul>

        <h2>Sample poem from the app</h2>
        <div class="ep-sample"><em>"The Candle"</em>The candle burns in winter's grip,
and shadows stretch across the floor.
A moth has pressed its paper wing
against the cold and frosted door.

The candle knows it cannot last —
its wax grows thin, its circle bright.
But still it burns to hold the past,
and moths will linger in its light.</div>

        <div class="ep-notice">
          <strong>JavaScript is required to use the workshop.</strong>
          The editor, syllable counter, rhyme tools, and everything else run client-side in JavaScript — there's no server to render them. Enable JavaScript in your browser settings (or whitelist this site in your content blocker) and reload to start writing.
        </div>
      </div>
